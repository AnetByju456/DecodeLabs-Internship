<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

    <title>TradeMart Confirmation</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="auth-page">

        <section class="auth-card">

            <h1>

                Confirm With Seller

            </h1>

            <p class="auth-subtitle">

                Contact seller before proceeding.

            </p>

            <form id="requestForm">

                <div class="form-group">

                    <label>

                        Choose Collection Method

                    </label>

                    <select id="collection">

                        <option>

                            Delivery

                        </option>

                        <option>

                            Collect From Seller

                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>

                        Seller Response

                    </label>

                    <select id="approval">

                        <option>

                            Approved

                        </option>

                        <option>

                            Pending

                        </option>

                    </select>

                </div>

                <button class="btn-primary auth-btn" type="submit">

                    Proceed To Cart

                </button>

            </form>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
