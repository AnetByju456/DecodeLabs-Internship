<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

    <title>TradeMart Profile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <div class="container">

            <nav class="navbar">

                <a href="index.html" class="logo">

                    <img src="assets/images/logo.jpeg" alt="TradeMart" class="logo-img">

                    <span>
                        TradeMart
                    </span>

                </a>

                <button class="menu-btn" id="menuBtn">

                    ☰

                </button>

                <ul class="nav-links" id="navLinks">

                    <li>
                        <a href="index.html">Home</a>
                    </li>

                    <li>
                        <a href="marketplace.html">Marketplace</a>
                    </li>

                    <li>
                        <a href="dashboard.html">Dashboard</a>
                    </li>

                    <li>
                        <a href="profile.html">Profile</a>
                    </li>

                    <li>
                        <a href="login.html">Login</a>
                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <main>

        <section>

            <div class="container">

                <div class="profile-card">

                    <div class="avatar">

                        A

                    </div>

                    <h1>

                        Anet

                    </h1>

                    <p>

                        Buyer • Seller

                    </p>

                </div>

            </div>

        </section>

        <section>

            <div class="container">

                <div class="profile-grid">

                    <div class="card">

                        <h3>

                            Personal Info

                        </h3>

                        <p>Email</p>

                        <strong>

                            anet@email.com

                        </strong>

                    </div>

                    <div class="card">

                        <h3>

                            Activity

                        </h3>

                        <p>

                            12 Listings

                        </p>

                        <p>

                            8 Purchases

                        </p>

                    </div>

                    <div class="card">

                        <h3>

                            Preferences

                        </h3>

                        <p>

                            Notifications Enabled

                        </p>

                    </div>

                </div>

            </div>

        </section>

        <section>

            <div class="container">

                <h2>

                    Saved Items

                </h2>
                <br>

                <div class="product-grid">

                    <article class="product-card">

                        <img src="assets/images/camera.jpeg" alt="DSLR Camera">

                        <div class="product-content">

                            <h3>

                                DSLR Camera

                            </h3>

                            <a href="product.html" class="btn-primary product-btn">

                                Open

                            </a>

                        </div>

                    </article>

                </div>

            </div>

        </section>



    </main>

    <footer>

        <div class="container">

            <p>

                © 2026 TradeMart

            </p>

        </div>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
