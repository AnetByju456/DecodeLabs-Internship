<!DOCTYPE html>

<html>

<head>
    <meta name="viewport" content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">
    <title>

        Checkout

    </title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="auth-page">

        <section class="auth-card">

            <h1>

                Checkout

            </h1>

            <form id="checkoutForm">

                <div class="form-group">

                    <label>

                        Full Name

                    </label>

                    <input required>

                </div>

                <div class="form-group">

                    <label>

                        Phone

                    </label>

                    <input required>

                </div>

                <div class="form-group">

                    <label>

                        Address

                    </label>

                    <input required>

                </div>

                <div class="form-group">

                    <label>

                        Payment

                    </label>

                    <input value="Cash On Delivery" readonly>

                </div>

                <button class="btn-primary auth-btn">

                    Confirm Order

                </button>

            </form>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
