<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

    <title>TradeMart Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <div class="container">

            <nav class="navbar">

                <a href="index.html" class="logo">

                    <img src="assets/images/logo.jpeg" alt="TradeMart" class="logo-img">

                    <span>
                        TradeMart
                    </span>

                </a>

                <button class="menu-btn" id="menuBtn">

                    ☰

                </button>

                <ul class="nav-links" id="navLinks">

                    <li>
                        <a href="index.html">Home</a>
                    </li>

                    <li>
                        <a href="marketplace.html">Marketplace</a>
                    </li>

                    <li>
                        <a href="dashboard.html">Dashboard</a>
                    </li>

                    <li>
                        <a href="profile.html">Profile</a>
                    </li>

                    <li>
                        <a href="login.html">Login</a>
                    </li>

                </ul>

                </nav>

        </div>

    </header>

    <main>

        <section>

            <div class="container">

                <div class="dashboard-header">

                    <h1 id="dashboardTitle">

                        Welcome

                    </h1>

                    <p id="dashboardSubtitle">

                        Loading...

                    </p>

                </div>

            </div>

        </section>

        <section>

            <div class="container">

                <div id="sellerView" style="display:none;">

                    <h2>

                        Seller Dashboard

                    </h2>

                    <br>

                    <div class="dashboard-actions">

                        <a href="marketplace.html" class="btn-primary">

                            Add Listing

                        </a>

                        <a href="#listings" class="btn-secondary">

                            Manage Listings

                        </a>

                        <a href="#requests" class="btn-primary">

                            Requests

                        </a>

                    </div>

                </div>

                <div id="buyerView" style="display:none;">

                    <h2>

                        Buyer Dashboard

                    </h2>

                    <br>

                    <div class="dashboard-actions">

                        <a href="marketplace.html" class="btn-primary">

                            Browse Products

                        </a>

                        <a href="cart.html" class="btn-secondary">

                            My Cart

                        </a>

                        <a href="#orders" class="btn-primary">

                            Orders

                        </a>

                    </div>

                </div>

            </div>

        </section>

        <section>

            <div class="container">

                <div class="dashboard-stats">

                    <div class="card">

                        <h2>

                            12

                        </h2>

                        <p>

                            Activity

                        </p>

                    </div>

                    <div class="card">

                        <h2>

                            8

                        </h2>

                        <p>

                            Requests

                        </p>

                    </div>

                    <div class="card">

                        <h2>

                            5

                        </h2>

                        <p>

                            Completed

                        </p>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <footer>

        <div class="container">

            <p>

                © 2026 TradeMart

            </p>

        </div>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
